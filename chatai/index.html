<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord2LLM Web UI</title>
    <link rel="stylesheet" href="style.css?v=20260608-pages">
</head>
<body>
    <div class="app-container">
        <nav class="quick-rail" aria-label="クイックアクセス">
            <button id="rail-brand-btn" class="rail-btn rail-brand" type="button" title="サイドバーを開閉" aria-label="サイドバーを開閉">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9" d="M12 3.5a8.5 8.5 0 108.5 8.5M12 3.5a8.5 8.5 0 00-7.36 12.75M12 3.5a8.5 8.5 0 017.36 12.75M8.2 7.3l7.6 9.4M15.8 7.3l-7.6 9.4"/></svg>
            </button>
            <div class="rail-main-actions">
                <button id="rail-new-room-btn" class="rail-btn" type="button" title="新規チャット" aria-label="新規チャット">
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14M5 12h14"/></svg>
                </button>
                <button id="rail-search-btn" class="rail-btn" type="button" title="履歴を検索" aria-label="履歴を検索">
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
                </button>
                <button id="rail-history-btn" class="rail-btn" type="button" title="履歴" aria-label="履歴">
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01"/></svg>
                </button>
            </div>
            <button id="rail-settings-btn" class="rail-btn rail-bottom" type="button" title="設定" aria-label="設定">
                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.3 4.3c.4-1.7 2.9-1.7 3.4 0 .2.9 1.2 1.4 2 1 1.5-.9 3.3.8 2.4 2.4-.5.8 0 1.8 1 2 1.7.4 1.7 2.9 0 3.4-.9.2-1.4 1.2-1 2 .9 1.5-.8 3.3-2.4 2.4-.8-.5-1.8 0-2 1-.4 1.7-2.9 1.7-3.4 0-.2-.9-1.2-1.4-2-1-1.5.9-3.3-.8-2.4-2.4.5-.8 0-1.8-1-2-1.7-.4-1.7-2.9 0-3.4.9-.2 1.4-1.2 1-2-.9-1.5.8-3.3 2.4-2.4.8.5 1.8 0 2-1z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </nav>
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>discord2LLM</h2>
            </div>

            <div class="sidebar-section">
                <div class="history-header">
                    <h3>履歴</h3>
                    <span id="rooms-count">0</span>
                </div>
                <input id="history-search" class="history-search" type="search" placeholder="履歴を検索" autocomplete="off">
                <ul id="rooms-list" class="rooms-list">
                </ul>
            </div>
        </aside>

        <main class="chat-area">
            <header class="top-nav">
                <div class="room-info">
                    <h1 id="active-room-title">ルームを選択してください</h1>
                    <div class="room-status">
                        <span id="model-status" class="status-pill">モデル未選択</span>
                        <span id="web-status" class="status-pill">Web検索 Off</span>
                        <span id="thinking-status" class="status-pill">通常</span>
                    </div>
                </div>
                <div class="top-actions">
                    <button id="new-room-btn" class="btn btn-secondary btn-icon" type="button" title="新規チャット">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14M5 12h14"/></svg>
                        新規チャット
                    </button>
                    <button id="temporary-room-btn" class="btn btn-secondary btn-icon" type="button" title="一時チャット">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l4 2M4 4l16 16M21 12a9 9 0 01-12.7 8.2M3 12a9 9 0 0114.7-7"/></svg>
                        一時チャット
                    </button>
                </div>
            </header>

            <div id="messages-container" class="messages-container">
                <div id="welcome-screen" class="welcome-screen">
                    <h2>チャットを始める</h2>
                    <p>履歴を選ぶか、下の操作からすぐに始められます。</p>
                    <div class="welcome-actions">
                        <button type="button" class="welcome-action" data-action="new-chat">新しいチャット</button>
                        <button type="button" class="welcome-action" data-action="attach-file">ファイルを読む</button>
                        <button type="button" class="welcome-action" data-action="image-mode">画像を生成</button>
                    </div>
                </div>
            </div>

            <div id="typing-indicator" class="typing-indicator hidden">
                <span class="indicator-dot"></span>
                <span class="indicator-dot"></span>
                <span class="indicator-dot"></span>
                <span id="typing-status-text">考え中...</span>
            </div>

            <div class="input-panel">
                <div id="attachment-bar" class="attachment-bar hidden"></div>
                <div class="input-wrapper">
                    <div class="tool-picker">
                        <button id="tool-menu-btn" class="tool-menu-btn" type="button" title="機能を選択" aria-label="機能を選択" aria-expanded="false">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14M5 12h14"/></svg>
                        </button>
                        <div id="tool-menu" class="tool-menu hidden" role="menu">
                            <button id="attach-file-btn" type="button" role="menuitem">
                                <span>ファイルを添付</span>
                                <small>PDF / テキスト / 画像</small>
                            </button>
                            <button id="image-mode-btn" type="button" role="menuitem">
                                <span>画像生成</span>
                                <small>ComfyUIで生成</small>
                            </button>
                        </div>
                    </div>
                    <input id="file-input" type="file" multiple class="hidden" accept=".txt,.md,.markdown,.csv,.json,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.ini,.cfg,.conf,.log,.pdf,image/*">
                    <textarea id="prompt-input" placeholder="メッセージを入力してください... (Ctrl+Enter で送信)" rows="1" disabled></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
                <div class="mini-controls">
                    <div class="control-item">
                        <label class="switch">
                            <input type="checkbox" id="web-search-fast-toggle">
                            <span class="slider"></span>
                        </label>
                        <span>Web検索</span>
                    </div>
                    <div class="control-item">
                        <select id="thinking-mode-fast-select">
                            <option value="off">通常モード (Off)</option>
                            <option value="native">推論モード (Native)</option>
                            <option value="debate">討論モード (Debate)</option>
                        </select>
                    </div>
                    <div id="input-context-hint" class="input-context-hint">チャットを選択すると入力できます</div>
                </div>
            </div>
        </main>
    </div>
    <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>ルーム設定</h2>
                <button id="settings-close-btn" class="btn-close">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="settings-form">
                    <div class="form-group">
                        <label for="settings-model">LLM モデル</label>
                        <select id="settings-model">
                            <!-- Models loaded dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="settings-system-prompt">カスタムプロンプト</label>
                        <textarea id="settings-system-prompt" rows="7" placeholder="このルーム専用のシステムプロンプトを入力。空欄で標準設定に戻ります。"></textarea>
                        <p class="form-help">`{username}` または `{user}` を入れると現在のユーザー名に置き換わります。</p>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="settings-temperature">温度 (Temperature)</label>
                            <input type="number" id="settings-temperature" step="0.1" min="0.0" max="2.0">
                        </div>
                        <div class="form-group">
                            <label for="settings-max-tokens">最大トークン数 (Max Tokens)</label>
                            <input type="number" id="settings-max-tokens" step="1" min="1">
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="switch">
                            <input type="checkbox" id="settings-web-search">
                            <span class="slider"></span>
                        </label>
                        <div class="switch-label">
                            <strong>Web検索機能を有効にする</strong>
                            <p>質問に応じてリアルタイムなWeb情報を取得します</p>
                        </div>
                    </div>

                    <div class="form-group" id="search-engine-group">
                        <label for="settings-search-engine">検索エンジン</label>
                        <select id="settings-search-engine">
                            <option value="duckduckgo">DuckDuckGo</option>
                            <option value="google">Google Custom Search</option>
                            <option value="googlenews">Google News</option>
                            <option value="wikipedia">Wikipedia</option>
                        </select>
                    </div>

                    <div class="form-group checkbox-group" id="web-scrape-group">
                        <label class="switch">
                            <input type="checkbox" id="settings-web-scrape">
                            <span class="slider"></span>
                        </label>
                        <div class="switch-label">
                            <strong>詳細ページのスクレイピング</strong>
                            <p>検索結果の上位URLにアクセスして本文を解析します</p>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="settings-thinking-mode">推論モード</label>
                        <select id="settings-thinking-mode">
                            <option value="off">通常モード (Off)</option>
                            <option value="native">推論モード (Native)</option>
                            <option value="debate">討論モード (Debate)</option>
                        </select>
                    </div>

                    <div class="modal-actions">
                        <button type="button" id="settings-save-btn" class="btn btn-primary">設定を保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script Entry Point -->
    <script src="app.js?v=20260608-pages"></script>
</body>
</html>
